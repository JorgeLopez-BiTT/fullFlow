name: Playwright Tests (Docker)
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This replaces the Node setup and Install steps
      - name: Build and Run in Docker
        run: |
          docker build -t playwright-tests .
          docker run --name playwright-container playwright-tests

      # Copy reports from the container to the runner so they can be uploaded
      - name: Extract Reports
        if: always()
        run: docker cp playwright-container:/usr/src/app/playwright-report ./playwright-report || true

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30